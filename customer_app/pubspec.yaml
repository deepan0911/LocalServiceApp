name: customer_app
description: Local Service Booking - Customer App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.2
  # HTTP
  dio: ^5.4.3+1
  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  # Socket.io
  socket_io_client: ^2.0.3+1
  # Image picker
  image_picker: ^1.1.2
  # File picker
  file_picker: ^8.0.3
  # Maps
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  # Firebase
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  # UI
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  intl: ^0.19.0
  # Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  # Notifications
  flutter_local_notifications: ^17.2.2
  firebase_auth: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
